<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>B&F – Orçamento</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/orcamento-bf/manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="B&F">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="apple-touch-icon" href="/orcamento-bf/icon-192.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
    }

    label {
      font-weight: 600;
      display: block;
      margin-top: 20px;
    }

    select, input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 5px;
    }

    button {
      margin-top: 30px;
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 6px;
    }

    #msg {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>B&F – Orçamento</h1>
<p>Lançamento rápido de despesas</p>

<label>Tipo de despesa</label>
<select id="tipo">
  <option value="">Selecione…</option>
  <option>Alimentação</option>
  <option>Transporte</option>
  <option>Compras</option>
  <option>Educação</option>
  <option>Saúde</option>
  <option>Entretenimento</option>
  <option>Outros</option>
</select>

<label>Valor</label>
<input type="number" id="valor" placeholder="0,00">

<button onclick="salvar()">Adicionar despesa</button>

<div id="msg"></div>

<script>
  function salvar() {
    const tipo = document.getElementById('tipo').value;
    const valor = document.getElementById('valor').value;

    if (!tipo || !valor) {
      document.getElementById('msg').innerText =
        'Preencha o tipo e o valor.';
      return;
    }

    document.getElementById('msg').innerText =
      'Despesa registrada (simulação).';

    document.getElementById('valor').value = '';
    document.getElementById('tipo').value = '';
  }
</script>

</body>
</html>
