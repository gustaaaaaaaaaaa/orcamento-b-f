<script>
  async function salvar() {
    const mesColuna = document.getElementById("mes").value;
    const tipo = document.getElementById("tipo").value;
    const valor = document.getElementById("valor").value;

    const msg = document.getElementById("msg");

    if (!mesColuna || !tipo || !valor) {
      msg.innerText = "Preencha mês, tipo e valor.";
      return;
    }

    try {
      const response = await fetch(
        "https://bf-backend-dfly.onrender.com/despesas/adicionar",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            mesColuna,
            tipo,
            valor: Number(valor)
          })
        }
      );

      msg.innerText = "Status do backend: " + response.status;

      if (response.ok) {
        msg.innerText = "✅ Despesa adicionada com sucesso";
        document.getElementById("valor").value = "";
        document.getElementById("tipo").value = "";
        document.getElementById("mes").value = "";
      } else {
        msg.innerText =
          "❌ Erro ao salvar (status " + response.status + ")";
      }
    } catch (err) {
      msg.innerText = "❌ Falha de conexão com o backend";
      console.error(err);
    }
  }
</script>
